<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>박경서 🤖</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #fdf7ee;
  --surface: #f5ede0;
  --bench: #b8824a;
  --bench-top: #8a5e2e;
  --text: #2a2438;
  --muted: #8a7e9a;
  --accent: #d4870a;
  --accent2: #e84b45;
  --accent3: #3aaa58;
  --accent4: #8844d8;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', Courier, monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* subtle grid bg */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ── Header ── */
.header {
  text-align: center;
  padding: 1.8rem 1rem 0.6rem;
  z-index: 1;
  position: relative;
}

.header h1 {
  font-size: clamp(1rem, 3.5vw, 1.5rem);
  color: var(--accent);
  letter-spacing: 0.12em;
  text-shadow: none;
}

.header p {
  color: var(--muted);
  font-size: 0.78rem;
  margin-top: 0.35rem;
  letter-spacing: 0.05em;
}

/* progress dots */
.progress {
  display: flex;
  gap: 7px;
  justify-content: center;
  margin-top: 0.7rem;
}
.pdot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: rgba(0,0,0,0.08);
  border: 1px solid rgba(0,0,0,0.18);
  transition: background 0.35s, box-shadow 0.35s, border-color 0.35s;
}
.pdot.on {
  background: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 9px var(--accent);
}

/* ── Scene ── */
#scene {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 820px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1rem 1rem 0;
}

/* ── Robot wrap ── */
#robot-wrap {
  position: relative;
  width: 260px;
  height: 390px;
  flex-shrink: 0;
}

#robot-svg {
  width: 100%;
  height: 100%;
  overflow: visible;
}

/* ── Speech bubble ── */
#bubble {
  position: absolute;
  top: 18px;
  left: 270px;
  background: #fff;
  color: #222;
  font-size: 0.88rem;
  font-weight: 700;
  border-radius: 14px;
  padding: 12px 18px;
  max-width: 280px;
  min-width: 200px;
  line-height: 1.5;
  opacity: 0;
  transform: scale(0.6) translateY(8px);
  transform-origin: left center;
  transition: opacity 0.38s cubic-bezier(.175,.885,.32,1.275),
              transform 0.38s cubic-bezier(.175,.885,.32,1.275);
  pointer-events: none;
  z-index: 20;
  box-shadow: 0 4px 24px rgba(0,0,0,0.35);
}
#bubble::before {
  content: '';
  position: absolute;
  left: -9px; top: 18px;
  border: 8px solid transparent;
  border-right-color: #fff;
  border-left: none;
}
#bubble.show {
  opacity: 1;
  transform: scale(1) translateY(0);
}

/* ── Workbench ── */
#workbench {
  width: 100%;
  max-width: 760px;
  margin-top: 1.8rem;
  background: var(--bench);
  border-radius: 14px 14px 0 0;
  border-top: 10px solid var(--bench-top);
  border-left: 5px solid rgba(0,0,0,0.25);
  border-right: 5px solid rgba(0,0,0,0.25);
  padding: 0.9rem 1.2rem 0.6rem;
  position: relative;
}

.bench-label {
  font-size: 0.68rem;
  color: rgba(255,255,255,0.65);
  letter-spacing: 0.2em;
  margin-bottom: 0.5rem;
}

#parts-area {
  position: relative;
  height: 220px;
  width: 100%;
}

/* ── Parts ── */
.part {
  position: absolute;
  cursor: grab;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  transition: filter 0.2s, transform 0.2s;
  z-index: 5;
}
.part svg {
  display: block;
}
.part .plabel {
  font-size: 0.58rem;
  color: rgba(255,255,255,0.75);
  letter-spacing: 0.06em;
  text-align: center;
}
.part:hover {
  filter: brightness(1.35) drop-shadow(0 0 8px rgba(255,217,61,0.55));
  transform: scale(1.1) rotate(-3deg);
}
.part.dragging-origin { opacity: 0.2; pointer-events: none; }
.part.gone { display: none; }

/* ghost drag clone */
#drag-ghost {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  filter: drop-shadow(0 0 14px rgba(255,217,61,0.85));
  transform: scale(1.18) rotate(4deg);
  transition: none;
}

/* slot pulse */
@keyframes slotPulse {
  0%,100% { opacity: 0.25; }
  50% { opacity: 0.75; }
}
.slot-shape { animation: slotPulse 1.6s ease-in-out infinite; }

/* spark wires at broken slots */
@keyframes wireFlicker {
  0%,88%,100% { opacity: 0; }
  90%,96% { opacity: 1; }
  93% { opacity: 0.4; }
}
.wire-spark { animation: wireFlicker 2.2s infinite; }
.wire-spark.d1 { animation-delay: 0.4s; }
.wire-spark.d2 { animation-delay: 0.9s; }
.wire-spark.d3 { animation-delay: 1.5s; }
.wire-spark.d4 { animation-delay: 0.2s; }
.wire-spark.d5 { animation-delay: 1.1s; }

/* eye flicker on broken robot */
@keyframes eyeFlicker {
  0%,85%,100% { opacity: 1; }
  87% { opacity: 0.1; }
  89% { opacity: 0.8; }
  91% { opacity: 0.15; }
}
.eye-flicker { animation: eyeFlicker 4s infinite; }

/* snap flash on install */
@keyframes snapFlash {
  0% { opacity: 0.8; transform: scale(1.25); }
  100% { opacity: 0; transform: scale(1.6); }
}
.snap-ring {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  animation: snapFlash 0.55s ease-out forwards;
  z-index: 8888;
}

/* floating sparks */
@keyframes sparkFly {
  0% { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
}
.spark-dot {
  position: fixed;
  width: 5px; height: 5px;
  border-radius: 50%;
  pointer-events: none;
  animation: sparkFly 0.75s ease-out forwards;
  z-index: 9000;
}

/* ── Final reveal overlay ── */
#final-reveal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(253,247,238,0.92);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
#final-reveal.open { display: flex; animation: fadeIn 0.5s ease; }

@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

.profile-card {
  background: linear-gradient(145deg, #fff8f0, #fdeedd);
  border: 1px solid rgba(212,135,10,0.3);
  border-radius: 22px;
  padding: 2rem 2.2rem 1.8rem;
  max-width: 420px;
  width: 90%;
  text-align: center;
  box-shadow: 0 8px 48px rgba(180,120,40,0.18), 0 2px 12px rgba(0,0,0,0.08);
  animation: cardPop 0.65s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes cardPop {
  from { transform: scale(0.45) translateY(30px); opacity:0; }
  to   { transform: scale(1)    translateY(0);    opacity:1; }
}

.profile-card .robo-icon { font-size: 3.2rem; margin-bottom: 0.4rem; display: block; }
.profile-card h2 {
  font-size: 2rem;
  color: var(--accent);
  text-shadow: none;
  margin-bottom: 0.25rem;
}
.profile-card .online-tag {
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  color: var(--accent3);
  margin-bottom: 1.4rem;
}

.kw-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 9px;
  justify-content: center;
  margin-bottom: 1.6rem;
}
.kw-chip {
  background: rgba(0,0,0,0.04);
  border: 1px solid rgba(0,0,0,0.12);
  border-radius: 20px;
  padding: 7px 15px;
  font-size: 0.83rem;
  color: var(--text);
  opacity: 0;
  animation: chipIn 0.45s ease forwards;
}
@keyframes chipIn {
  from { opacity:0; transform: translateY(8px); }
  to   { opacity:1; transform: translateY(0); }
}

.close-btn {
  background: none;
  border: 1px solid var(--muted);
  color: var(--muted);
  border-radius: 9px;
  padding: 8px 22px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.82rem;
  letter-spacing: 0.08em;
  transition: border-color 0.2s, color 0.2s;
}
.close-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── Reset button ── */
#reset-btn {
  position: fixed;
  top: 16px;
  right: 20px;
  z-index: 500;
  background: rgba(0,0,0,0.04);
  border: 1px solid rgba(0,0,0,0.14);
  color: var(--muted);
  border-radius: 10px;
  padding: 7px 14px;
  font-family: inherit;
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, color 0.2s;
}
#reset-btn:hover {
  background: rgba(0,0,0,0.08);
  border-color: var(--accent2);
  color: var(--accent2);
}
</style>
</head>

    w: 60, h: 44,
    svg: `<svg viewBox="0 0 60 44" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="3" width="54" height="38" rx="10" fill="#ecc880"/>
      <rect x="10" y="13" width="40" height="8" rx="3" fill="#f8dea0"/>

    </svg>`
  },
  {
    id: 'right-leg', label: '오른쪽 다리',
    keyword: '진로 고민 중 🤔',
    slotId: 'slot-right-leg', instId: 'i-right-leg',
    cx: 146, cy: 338, color: '#ffb648',
    w: 60, h: 44,
    svg: `<svg viewBox="0 0 60 44" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="3" width="54" height="38" rx="10" fill="#ecc880"/>
      <rect x="10" y="13" width="40" height="8" rx="3" fill="#f8dea0"/>
      <circle cx="18" cy="33" r="5.5" fill="#d8a848"/>
      <circle cx="43" cy="33" r="5.5" fill="#d8a848"/>
    </svg>`
  },
  {
    id: 'power', label: '파워 코어',
    keyword: null,
    isFinal: true,
    slotId: 'slot-power', instId: 'i-power',
    cx: 110, cy: 278, color: '#ffd93d',
    w: 52, h: 52,
    svg: `<svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
      <circle cx="26" cy="26" r="24" fill="#ffd93d"/>

      <text x="26" y="33" text-anchor="middle" font-size="18" fill="#e07000">⚡</text>
    </svg>`
  }

const ALL_KEYWORDS = [
  '03년생 🐣', '본가 세종 🏡', '여유로운 삶 추구 ☕',
  '벤처전공 💡', '영화, 음악 좋아함 🎬🎵',
  '착하게 살기 😇', '진로 고민 중 🤔'
];

// ─── Guide messages (순서대로 안내) ──────────────────────────────────────────
const GUIDE_ORDER = ['antenna','left-eye','right-eye','left-arm','right-arm','chest','left-leg','right-leg','power'];

const GUIDE_TEXT = {
  'antenna':   "으... 안테나가 없어서 신호를 못 잡겠어.\n머리 위에 달아줄래? 부탁이야 📡",
  'left-eye':  "이제 신호는 잡혔는데 눈이 없어서 아무것도 못 봐.\n왼쪽 눈 좀 달아줄 수 있어? 👁️",
  'right-eye': "오른쪽 눈도 달아줘!\n한쪽 눈으론 세상이 기울어 보인다고 ㅠ 👁️",
  'left-arm':  "팔이 없어서 하이파이브도 못 해.\n왼팔 달아줄 수 있어? 👏",
  'right-arm': "오른팔도 부탁할게!\n한 팔로 박수치면 좀 어색하잖아 💪",
  'chest':     "가슴 패널이 없으니 심장이 다 보여서 민망해...\n가려줄 수 있도록 패널을 달아줘",
  'left-leg':  "다리 없이 서있는 게 생각보다 훨씬 힘들어...\n왼쪽 다리 좀 달아줘 🦵",
  'right-leg': "오른쪽도 달아줘!\n한쪽만 있으면 뱅글뱅글 돌게 생겼잖아 🦵",
  'power':     "파워 코어만 넣으면 돼!\n마지막이니까 힘내줘... 나도 힘낼게 ⚡",
};

function getNextGuide() {
  for (const id of GUIDE_ORDER) {
    if (!installed.has(id)) return GUIDE_TEXT[id];
  }
  return null;
}

// ─── State ────────────────────────────────────────────────────────────────────
const installed = new Set();
let activePart = null;       // { part, el, origLeft, origTop }
let ghostEl = null;
let dragOffX = 0, dragOffY = 0;

// ─── Build progress dots ───────────────────────────────────────────────────
const progressEl = document.getElementById('progress');
PARTS.forEach(p => {
  const d = document.createElement('div');
  d.className = 'pdot';
  d.id = 'dot-' + p.id;
  progressEl.appendChild(d);
});

// ─── Scatter parts on bench ────────────────────────────────────────────────
const partsArea = document.getElementById('parts-area');

function scatterParts() {
  const W = partsArea.offsetWidth || 700;
  const H = 220;
  const GAP = 18; // 부품 사이 최소 여백
  const placed = []; // { x, y, w, h }

  PARTS.forEach(part => {
    const el = document.createElement('div');
    el.className = 'part';
    el.id = 'part-' + part.id;
    el.title = part.label;
    el.innerHTML = part.svg + `<div class="plabel">${part.label}</div>`;
    const pw = part.w;
    const ph = part.h + 20; // 아이콘 + 라벨 높이
    el.style.width  = pw + 'px';
    el.style.height = ph + 'px';

    // AABB 충돌 체크로 겹침 방지
    let x, y, tries = 0;
    do {
      x = 10 + Math.random() * Math.max(0, W - pw - 20);
      y = 6  + Math.random() * Math.max(0, H - ph - 12);
      tries++;
    } while (tries < 400 && placed.some(p =>
      x < p.x + p.w + GAP &&
      x + pw + GAP > p.x &&
      y < p.y + p.h + GAP &&
      y + ph + GAP > p.y
    ));

    placed.push({ x, y, w: pw, h: ph });
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    partsArea.appendChild(el);
  });
}

window.addEventListener('load', () => {
  scatterParts();
  setTimeout(() => showBubble(GUIDE_TEXT['antenna'], true), 900);
});

// ─── Drag: mouse ──────────────────────────────────────────────────────────
document.addEventListener('mousedown', startDrag);
document.addEventListener('mousemove', moveDrag);
document.addEventListener('mouseup',   endDrag);

// ─── Drag: touch ──────────────────────────────────────────────────────────
document.addEventListener('touchstart', e => {
  const t = e.touches[0];
  startDrag({ target: t.target, clientX: t.clientX, clientY: t.clientY,
               preventDefault: () => e.preventDefault() });
}, { passive: false });

document.addEventListener('touchmove', e => {
  if (!activePart) return;
  e.preventDefault();
  const t = e.touches[0];
  moveDrag({ clientX: t.clientX, clientY: t.clientY });
}, { passive: false });

document.addEventListener('touchend', e => {
  if (!activePart) return;
  const t = e.changedTouches[0];
  endDrag({ clientX: t.clientX, clientY: t.clientY });
});

function startDrag(e) {
  const partEl = e.target.closest('.part');
  if (!partEl || partEl.classList.contains('gone')) return;
  e.preventDefault();

  const part = PARTS.find(p => 'part-' + p.id === partEl.id);
  if (!part || installed.has(part.id)) return;

  const rect = partEl.getBoundingClientRect();
  dragOffX = e.clientX - rect.left;
  dragOffY = e.clientY - rect.top;

  activePart = { part, el: partEl };
  partEl.classList.add('dragging-origin');

  ghostEl = document.getElementById('drag-ghost');
  ghostEl.innerHTML = part.svg;
  ghostEl.style.display = 'block';
  ghostEl.style.width  = part.w + 'px';
  ghostEl.style.height = part.h + 'px';
  ghostEl.style.left   = (e.clientX - dragOffX) + 'px';
  ghostEl.style.top    = (e.clientY - dragOffY) + 'px';
}

function moveDrag(e) {
  if (!activePart || !ghostEl) return;
  ghostEl.style.left = (e.clientX - dragOffX) + 'px';
  ghostEl.style.top  = (e.clientY - dragOffY) + 'px';
}

function endDrag(e) {
  if (!activePart) return;

  const { part, el } = activePart;
  ghostEl.style.display = 'none';
  el.classList.remove('dragging-origin');

  // Convert slot SVG coords → screen coords
  const svgEl  = document.getElementById('robot-svg');
  const svgRect = svgEl.getBoundingClientRect();
  const scaleX  = svgRect.width  / 220;
  const scaleY  = svgRect.height / 360;

  const slotSX = svgRect.left + part.cx * scaleX;
  const slotSY = svgRect.top  + part.cy * scaleY;

  // Center of drop ghost
  const dropCX = e.clientX - dragOffX + part.w / 2;
  const dropCY = e.clientY - dragOffY + part.h / 2;

  const dist = Math.hypot(dropCX - slotSX, dropCY - slotSY);

  if (dist < 60 && !installed.has(part.id)) {
    installPart(part, el, slotSX, slotSY);
  }

  activePart = null;
}

// ─── Install part ─────────────────────────────────────────────────────────
function installPart(part, el, slotSX, slotSY) {
  installed.add(part.id);

  el.classList.add('gone');
  document.getElementById(part.instId).style.display = 'block';
  document.getElementById(part.slotId).style.display = 'none';
  document.getElementById('dot-' + part.id).classList.add('on');

  spawnSparks(slotSX, slotSY, part.color);
  showSnapRing(slotSX, slotSY, part.color);

  if (part.isFinal) {
    // 완성 농담 멘트 → 잠깐 후 프로필 카드
    showBubble("드디어 완성! 어때, 엄청 흥미진진했지?\n그렇다고 해줘.", false);
    setTimeout(showFinalReveal, 2800);
  } else {
    // 키워드 표시 → 2.8초 후 다음 안내
    showBubble(part.keyword, false);
    setTimeout(() => {
      const guide = getNextGuide();
      if (guide) showBubble(guide, true);
    }, 2800);
  }
}

// ─── Speech bubble ─────────────────────────────────────────────────────────
let bubbleTimer = null;
function showBubble(text, persistent = false) {
  const b  = document.getElementById('bubble');
  const bt = document.getElementById('bubble-text');
  clearTimeout(bubbleTimer);
  b.classList.remove('show');
  // 줄바꿈 지원
  requestAnimationFrame(() => {
    bt.innerHTML = text.replace(/\n/g, '<br>');
    b.classList.add('show');
    if (!persistent) {
      bubbleTimer = setTimeout(() => b.classList.remove('show'), 2600);
    }
  });
}

// ─── Snap ring flash ───────────────────────────────────────────────────────
function showSnapRing(x, y, color) {
  const ring = document.createElement('div');
  ring.className = 'snap-ring';
  ring.style.cssText = `
    left: ${x - 22}px; top: ${y - 22}px;
    width: 44px; height: 44px;
    border: 3px solid ${color};
    box-shadow: 0 0 14px ${color};
  `;
  document.body.appendChild(ring);
  setTimeout(() => ring.remove(), 600);
}

// ─── Sparks ────────────────────────────────────────────────────────────────
function spawnSparks(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const s = document.createElement('div');
    s.className = 'spark-dot';
    const ang = Math.random() * Math.PI * 2;
    const dist = 30 + Math.random() * 38;
    s.style.cssText = `
      left: ${x}px; top: ${y}px;
      background: ${color};
      --dx: ${Math.cos(ang) * dist}px;
      --dy: ${Math.sin(ang) * dist}px;
    `;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 800);
  }
}

// ─── Final reveal ──────────────────────────────────────────────────────────
function showFinalReveal() {
  document.getElementById('bubble').classList.remove('show');
  const grid = document.getElementById('kw-grid');
  grid.innerHTML = '';
  ALL_KEYWORDS.forEach((kw, i) => {
    const chip = document.createElement('div');
    chip.className = 'kw-chip';
    chip.textContent = kw;
    chip.style.animationDelay = (i * 0.1) + 's';
    grid.appendChild(chip);
  });
  document.getElementById('final-reveal').classList.add('open');
}

// ─── Reset ────────────────────────────────────────────────────────────────────
function resetAll() {
  // 먼저 로봇이 한마디
  showBubble("오... 또 하려고?\n(굳이.?)", false);

  setTimeout(() => {
    // 파이널 닫기
    document.getElementById('final-reveal').classList.remove('open');

    // 설치 상태 초기화
    installed.clear();

    // 장착 오버레이 숨기기
    PARTS.forEach(p => {
      document.getElementById(p.instId).style.display = 'none';
      document.getElementById(p.slotId).style.display = '';
      document.getElementById('dot-' + p.id).classList.remove('on');
    });

    // 부품 다시 뿌리기
    partsArea.innerHTML = '';
    scatterParts();

    // 초기 안내 말풍선
    setTimeout(() => showBubble(GUIDE_TEXT['antenna'], true), 400);
  }, 1800);
}
